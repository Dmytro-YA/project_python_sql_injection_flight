{% extends "base.html" %}

{% block title %}Add Flight - FlightTracker{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>Add New Flight</h2>
    {% if error %}
        <div class="alert">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group">
            <label for="number">Flight Number:</label>
            <input type="text" id="number" name="number" required>
        </div>
        
        <div class="form-group">
            <label for="departure">Departure:</label>
            <input type="text" id="departure" name="departure" required>
        </div>
        
        <div class="form-group">
            <label for="destination">Destination:</label>
            <input type="text" id="destination" name="destination" required>
        </div>
        
        <div class="form-group">
            <label for="capacity">Capacity:</label>
            <input type="number" id="capacity" name="capacity" required min="0">
        </div>
        
        <div class="form-group">
            <label for="passengers">Passengers:</label>
            <input type="number" id="passengers" name="passengers" required min="0">
        </div>
        
        <div class="form-group">
            <label for="status">Status:</label>
            <select id="status" name="status">
                <option value="On Time">On Time</option>
                <option value="Delayed">Delayed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="time_to_flight">Time to Flight (hours):</label>
            <input type="number" step="0.1" id="time_to_flight" name="time_to_flight" required min="0">
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn">Add Flight</button>
            <a href="{{ url_for('index') }}" class="btn" style="background: #95a5a6;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
